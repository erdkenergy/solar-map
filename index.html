<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Solar Map MVP</title>

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.3/mapbox-gl-draw.css" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" rel="stylesheet" />

  <style>
    body { margin: 0; }
    #map { width: 100%; height: 100vh; }

    .mapboxgl-ctrl-top-right {
  top: 5px !important;
}

.mapboxgl-ctrl-top-right .mapboxgl-ctrl-group {
  margin-top: 45px;
}

    #panel {
      position: absolute;
      top: 125px;
      right: 40px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      max-width: 300px;
      font-family: Arial;
      display: none;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    #hint {
      position:absolute;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.7);
      color:white;
      padding:8px 14px;
      border-radius:8px;
      font-family:Arial;
      font-size:14px;
      z-index:10;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="searchBox" style="
  position: absolute;
  top: 85px;
  right: 3px;
  z-index: 10;
  width: 250px;
"></div>

<div style="
position: absolute;
bottom: 20px;
left: 20px;
background: white;
padding: 12px;
border-radius: 12px;
box-shadow: 0 5px 20px rgba(0,0,0,0.2);
display: flex;
gap: 8px;
z-index: 10;
">

<button onclick="resetAll()" style="
padding: 8px 12px;
border: none;
border-radius: 6px;
background: #FF3B30;
color: white;
cursor: pointer;
">
🗑️ SMAZAT
</button>

<button onclick="setMode('auto')" style="
padding: 8px 12px;
border: none;
border-radius: 6px;
background: #007AFF;
color: white;
cursor: pointer;
">
AUTO
</button>

<button onclick="setMode('manual')" style="
padding: 8px 12px;
border: none;
border-radius: 6px;
background: #E5E5EA;
color: black;
cursor: pointer;
">
MANUÁL
</button>

</div>

<div id="hint">Klikni na střechu</div>
<div id="guide" style="
  position:absolute;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.8);
  color:white;
  padding:15px 20px;
  border-radius:12px;
  font-family:Arial;
  z-index:20;
  text-align:center;
">
  <div id="guideText" style="margin-bottom:10px;">
    Krok 1: Vyhledej svůj dům nebo se přibliž na mapě
  </div>

  <button onclick="nextStep()" style="
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:#007AFF;
    color:white;
    cursor:pointer;
  ">
    Další
  </button>
</div>

<button onclick="calculateNow()" style="
  margin-top:10px;
  background:#007AFF;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
">
  ⚡ Spočítat potenciál
</button>

<div id="panel">
  <div id="output"></div>

  <button onclick="sendLead()" style="margin-top:10px;">
    👉 Získat nabídku zdarma
  </button>
</div>

<script>
let lastData = null;
let lastAddress = null;
let mode = 'manual';

mapboxgl.accessToken = 'pk.eyJ1IjoiZXJka2VuZXJneSIsImEiOiJjbW8xYzQ0bm0wZmoxMnBxdGEwOGJjYmQwIn0.74wjBVxI__L0gy_4fZeI4w';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/satellite-streets-v12',
  center: [15.2, 50.0],
  zoom: 12
});

const draw = new MapboxDraw({
  displayControlsDefault: false,
  controls: {
    polygon: true,
    trash: false
  }
});

map.addControl(draw);
map.addControl(new mapboxgl.NavigationControl());

const geocoder = new MapboxGeocoder({
  accessToken: mapboxgl.accessToken,
  mapboxgl: mapboxgl
});
document.getElementById('searchBox').appendChild(geocoder.onAdd(map));

function resetAll() {
  draw.deleteAll();
  lastData = null;
  lastAddress = null;
  document.getElementById("panel").style.display = "none";
}

function setMode(selected) {
  mode = selected;
  resetAll();

  document.getElementById("hint").innerText =
    mode === "auto"
      ? "Klikni na střechu"
      : "Nakresli oblast";
}

map.on('click', (e) => {
  if (mode !== 'auto') return;
  resetAll();

  const lng = e.lngLat.lng;
  const lat = e.lngLat.lat;

  // 🔥 JEDINÝ FETCH
  fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${lng},${lat}.json?access_token=${mapboxgl.accessToken}`)
    .then(res => res.json())
    .then(data => {
      if (data.features && data.features.length > 0) {
        lastAddress = data.features[0].place_name;
      } else {
        lastAddress = "nezjištěno";
      }

      updateArea();
    });

  const size = 0.0003;

  const square = {
    type: 'Feature',
    geometry: {
      type: 'Polygon',
      coordinates: [[
        [lng - size, lat - size],
        [lng + size, lat - size],
        [lng + size, lat + size],
        [lng - size, lat + size],
        [lng - size, lat - size]
      ]]
    }
  };

  const id = draw.add(square)[0];
  draw.changeMode('direct_select', { featureId: id });
});

map.on('draw.update', updateArea);
map.on('draw.create', updateArea);

function updateArea() {
  const data = draw.getAll();

  if (!data || data.features.length === 0) return;

  const area = turf.area(data);
  const m2 = Math.round(area);

  const production = m2 * 180 * 0.75;
  const money = Math.round(production * 5);
  const returnYears = (m2 * 5000) / money;

  document.getElementById("panel").style.display = "none";

  document.getElementById("output").innerHTML = `
  <div style="font-size:18px;font-weight:bold;margin-bottom:10px;">
    ⚡ Tvůj dům může vydělávat
  </div>

  <div style="font-family: Arial; line-height:1.5;">
      <b>Výsledek</b><br><br>

      Plocha: <b>${m2} m²</b><br>
      Výroba: <b>${Math.round(production)} kWh</b><br>
      Úspora: <b>${money} Kč</b><br>
      Návratnost: <b>${returnYears.toFixed(1)} let</b><br><br>

      <div style="font-size:11px;color:#666;">
        Orientační výpočet
      </div>
    </div>
  `;

  lastData = {
    m2,
    production,
    money
  };

}

async function sendLead() {
  const email = prompt("Zadej svůj email:");
  if (!email) return;

  // 👉 pokud není adresa → načti ji TEĎ
  if (!lastAddress) {
    const center = map.getCenter();

    const res = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${center.lng},${center.lat}.json?access_token=${mapboxgl.accessToken}`);
    const data = await res.json();

    if (data.features && data.features.length > 0) {
      lastAddress = data.features[0].place_name;
    } else {
      lastAddress = "nezjištěno";
    }
  }

  fetch("https://script.google.com/macros/s/AKfycbyLSOLWuePP25K3ttcvjOREspCMnu3rYQdwv6IiJgHu7e5gD8jj2CMR9egMoPZE-osf/exec", {
  method: "POST",
  mode: "no-cors",
  body: JSON.stringify({
    email: email,
    address: lastAddress,
    area: lastData.m2,
    production: lastData.production,
    savings: lastData.money
  })
});
  alert("Díky! Ozveme se.");
}

let step = 1;

function nextStep() {
  step++;

  const text = document.getElementById("guideText");

  if (step === 2) {
    text.innerHTML = "Krok 2: Klikni nebo nakresli střechu svého domu";

    // 👉 zapni AUTO mód
    setMode('auto');

    // 👉 změň hint
    document.getElementById("hint").innerText = "Klikni na střechu domu";
  }

  else if (step === 3) {
    text.innerHTML = "Krok 3: Zobrazíme ti potenciál a úsporu";
  }

  else {
    document.getElementById("guide").style.display = "none";

    // 👉 onboarding zmizí
    document.getElementById("hint").innerText = "Hotovo ✔️";
  }
}

function calculateNow() {
  if (!lastData) {
    alert("Nejprve označ střechu");
    return;
  }

  document.getElementById("panel").style.display = "block";
}

</script>

</body>
</html>
